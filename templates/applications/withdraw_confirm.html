{% extends "base.html" %}
{% block title %}Already Applied — ResumeAI{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-16">
  <div class="w-full max-w-md text-center fade-up">
    <div class="glass rounded-2xl p-10">
      <div class="w-14 h-14 rounded-2xl mx-auto mb-5 flex items-center justify-center"
           style="background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.25);">
        <svg class="w-7 h-7 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>
      <h2 class="text-xl font-bold text-white mb-2" style="font-family:'Syne',sans-serif;">Already applied</h2>
      <p class="text-slate-400 text-sm mb-1">You've already submitted an application for</p>
      <p class="text-blue-400 font-semibold mb-5">{{ job.title }}</p>
      <p class="text-slate-500 text-xs mb-6">Track the status of your application from your dashboard.</p>
      <div class="flex items-center justify-center gap-3">
        <a href="{% url 'candidate_dashboard' %}" class="btn-primary text-white rounded-xl px-6 py-2.5 text-sm">
          Go to Dashboard
        </a>
        <a href="{% url 'job_list' %}" class="btn-outline rounded-xl px-6 py-2.5 text-sm">
          Browse Jobs
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
